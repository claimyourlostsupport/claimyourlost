# Render Blueprint: API lives in server/; build/start use npm --prefix server (do not use
# root `yarn` — there is no lockfile at repo root and root has no API start script).
# Dashboard: New → Blueprint → connect this repo → Render will prompt for secret env vars.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: claimyourlost-api
    runtime: node
    plan: free
    region: oregon
    # Install and run API from monorepo root (avoids Render ignoring rootDir / wrong cwd)
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
